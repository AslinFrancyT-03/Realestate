<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealEstatePro — Agent Details</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <!-- Bootstrap 5.3.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome 6.5.1 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <!-- ========================= NAVBAR ========================= -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <span class="brand-icon"><i class="fa-solid fa-building"></i></span>
        RealEstatePro
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <i class="fa-solid fa-bars" style="color:var(--text-primary);"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="form.html">Add Listing</a></li>
          <li class="nav-item"><a class="nav-link" href="database.html">View Database</a></li>
          <li class="nav-item"><a class="nav-link active" href="agents.html">Agent Details</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ========================= MAIN CONTENT ========================= -->
  <div class="main-content">

    <!-- Page Title -->
    <div class="page-title-section">
      <h1 class="page-title">
        <i class="fa-solid fa-user-tie me-2 text-brand-primary"></i>Agent Details
      </h1>
    </div>

    <!-- Agent Grid -->
    <div class="db-grid-container card-glass">
      <!-- Spinner -->
      <div id="tableSpinner" class="spinner-overlay">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading…</span>
        </div>
      </div>

      <!-- Filter Bar / Search Bar -->
      <div class="filter-bar">
        <input type="text" class="filter-control" id="searchNameInput" placeholder="Search by name..." />
        <input type="text" class="filter-control" id="searchCompanyInput" placeholder="Search by company..." />
        <input type="text" class="filter-control" id="searchStateInput" placeholder="Search by state..." />
        <button class="btn-reset-filter" id="resetAgentsFiltersBtn">
          <i class="fa-solid fa-rotate-left"></i> Reset
        </button>
      </div>

      <!-- Table -->
      <div class="table-fixed-wrapper">
        <table class="table-premium">
          <thead>
            <tr>
              <th>Name</th>
              <th>Company Name</th>
              <th>Website</th>
              <th>Address</th>
              <th>Email</th>
              <th>State</th>
              <th>Country</th>
            </tr>
          </thead>
          <tbody id="agentsTableBody">
            <!-- Rendered by agents.js -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination-wrapper">
        <div class="d-flex align-items-center gap-2">
          <span class="pagination-info" id="paginationInfo">Showing 0 of 0</span>
          <select class="page-size-select" id="pageSizeSelect">
            <option value="10" selected>10 / page</option>
            <option value="25">25 / page</option>
            <option value="50">50 / page</option>
          </select>
        </div>
        <div class="pagination-buttons">
          <button class="btn-pagination" id="prevPageBtn" disabled><i class="fa-solid fa-chevron-left"></i></button>
          <button class="btn-pagination" id="nextPageBtn" disabled><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>

    </div>

  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container-custom"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Scripts -->
  <script src="js/api.js"></script>
  <script src="js/agents.js"></script>
</body>
</html>
