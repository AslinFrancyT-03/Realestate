<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealEstatePro — Add Listing</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5.3.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- FontAwesome 6.5.1 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

  <!-- Custom -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <!-- ========================= NAVBAR ========================= -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <span class="brand-icon"><i class="fa-solid fa-building"></i></span>
        RealEstatePro
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <i class="fa-solid fa-bars" style="color:var(--text-primary);"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="form.html">Add Listing</a></li>
          <li class="nav-item"><a class="nav-link" href="database.html">View Database</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ========================= MAIN CONTENT ========================= -->
  <div class="main-content" style="max-width:900px;">

    <div class="page-title-section mb-4">
      <h1 class="page-title" id="formPageTitle">
        <i class="fa-solid fa-plus-circle me-2 text-accent-blue"></i>Add New Listing
      </h1>
    </div>

    <form id="listingForm" novalidate>
      <!-- Section: Core Identity -->
      <div class="card-glass mb-4">
        <div class="card-body-custom">
          <div class="form-section-title">
            <i class="fa-solid fa-id-card"></i> Core Identity
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom" for="name">Business Name *</label>
              <input type="text" class="form-control form-control-custom" id="name" required placeholder="e.g. Skyline Realty" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="broker">Broker</label>
              <input type="text" class="form-control form-control-custom" id="broker" placeholder="e.g. John Smith" />
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Contact Details -->
      <div class="card-glass mb-4">
        <div class="card-body-custom">
          <div class="form-section-title">
            <i class="fa-solid fa-address-book"></i> Contact Details
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom" for="mobile">Mobile</label>
              <input type="text" class="form-control form-control-custom" id="mobile" placeholder="+1 (555) 123-4567" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="phone">Phone</label>
              <input type="text" class="form-control form-control-custom" id="phone" placeholder="(555) 987-6543" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="email">Email</label>
              <input type="email" class="form-control form-control-custom" id="email" placeholder="broker@company.com" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="website">Website</label>
              <input type="url" class="form-control form-control-custom" id="website" placeholder="https://www.company.com" />
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Ratings & Categorisation -->
      <div class="card-glass mb-4">
        <div class="card-body-custom">
          <div class="form-section-title">
            <i class="fa-solid fa-star-half-stroke"></i> Ratings & Categorisation
          </div>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label-custom" for="totalScore">Total Score</label>
              <input type="number" step="0.1" min="0" max="5" class="form-control form-control-custom" id="totalScore" placeholder="4.5" />
            </div>
            <div class="col-md-4">
              <label class="form-label-custom" for="reviewsCount">Reviews Count</label>
              <input type="number" min="0" class="form-control form-control-custom" id="reviewsCount" placeholder="128" />
            </div>
            <div class="col-md-4">
              <label class="form-label-custom" for="category">Category</label>
              <input type="text" class="form-control form-control-custom" id="category" placeholder="e.g. real_estate_agency" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="categoryName">Category Name</label>
              <input type="text" class="form-control form-control-custom" id="categoryName" placeholder="e.g. Real Estate Agency" />
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Address & Navigation -->
      <div class="card-glass mb-4">
        <div class="card-body-custom">
          <div class="form-section-title">
            <i class="fa-solid fa-location-dot"></i> Address & Navigation
          </div>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label-custom" for="address">Full Address</label>
              <input type="text" class="form-control form-control-custom" id="address" placeholder="123 Main St, Suite 100" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="street">Street</label>
              <input type="text" class="form-control form-control-custom" id="street" placeholder="123 Main St" />
            </div>
            <div class="col-md-6">
              <label class="form-label-custom" for="city">City</label>
              <input type="text" class="form-control form-control-custom" id="city" placeholder="New York" />
            </div>
            <div class="col-md-4">
              <label class="form-label-custom" for="state">State</label>
              <input type="text" class="form-control form-control-custom" id="state" placeholder="NY" />
            </div>
            <div class="col-md-4">
              <label class="form-label-custom" for="country">Country</label>
              <input type="text" class="form-control form-control-custom" id="country" placeholder="United States" />
            </div>
            <div class="col-md-4">
              <label class="form-label-custom" for="googleMaps">Google Maps URL</label>
              <input type="url" class="form-control form-control-custom" id="googleMaps" placeholder="https://maps.google.com/…" />
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="d-flex justify-content-end gap-2 mb-5">
        <button type="button" class="btn btn-outline-premium" id="clearFormBtn">
          <i class="fa-solid fa-eraser"></i> Clear
        </button>
        <button type="submit" class="btn btn-premium btn-lg">
          <i class="fa-solid fa-floppy-disk"></i> Save Listing
        </button>
      </div>
    </form>

  </div>

  <!-- ========================= TOAST CONTAINER ========================= -->
  <div id="toastContainer" class="toast-container-custom"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Scripts -->
  <script src="js/api.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
